# Example IntegrationTestScenario for namespace sfathii-tenant / application coffee-break.
# Apply with oc/kubectl or mirror these fields in Konflux UI → Integration tests.
---
apiVersion: appstudio.redhat.com/v1beta2
kind: IntegrationTestScenario
metadata:
  name: coffee-break-verify-hello-world
  namespace: sfathii-tenant
spec:
  application: coffee-break
  contexts:
    - description: Verify dno-pipelines-f97fa image prints Hello World
      name: application
  resolverRef:
    resolver: git
    resourceKind: pipeline
    params:
      - name: url
        value: https://github.com/tomswallaRH/dno-pipelines.git
      - name: revision
        value: main
      - name: pathInRepo
        value: integration/pipelines/coffee-break-verify-hello-world.yaml
