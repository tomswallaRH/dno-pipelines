apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: gitlab-monitor-pipeline
spec:
  workspaces:
    - name: output
      description: The git repo will be cloned into this workspace
  params:
    - name: gitrevision
      type: string
      default: main
    - name: sender
      type: string
      description: Email sender address
      default: "gitlab-monitor@redhat.com"
    - name: recipients
      type: string
      description: Email recipients (space delimited list)
      default: "devops@redhat.com"
  tasks:
    - name: init-workspace
      taskSpec:
        workspaces:
          - name: output
        steps:
          - name: init
            image: registry.redhat.io/ubi8/ubi-minimal
            script: |
              #!/usr/bin/env bash
              mkdir -p $(workspaces.output.path)/{monitor,jenkins-csb-controller,dno-config,argocd,dns}
              chmod -R 775 $(workspaces.output.path)
            securityContext:
              runAsUser: 0
      workspaces:
        - name: output
          workspace: output
    - name: clone-monitor-repo
      runAfter:
        - init-workspace
      taskRef:
        kind: ClusterTask
        name: git-clone
      params:
        - name: url
          value: "https://gitlab.cee.redhat.com/ccit/gitlab-monitor.git"
        - name: revision
          value: $(params.gitrevision)
        - name: sslVerify
          value: 'false'
        - name: subdirectory
          value: "monitor"
        - name: userHome
          value: /tekton/home
        - name: gitInitImage
          value: >-
            registry.redhat.io/openshift-pipelines/pipelines-git-init-rhel8@sha256:aa2599a70c14b4f30c9959f6ddafc2510180764d9464e6e2ec5f2147a0a0bf80
      workspaces:
        - name: output
          workspace: output
    - name: clone-jenkins-csb-controller
      runAfter:
        - init-workspace
      taskRef:
        kind: ClusterTask
        name: git-clone
      params:
        - name: url
          value: "https://gitlab.cee.redhat.com/ccit/deployments/jenkins-csb/controller.git"
        - name: revision
          value: main
        - name: sslVerify
          value: 'false'
        - name: subdirectory
          value: "jenkins-csb-controller"
      workspaces:
        - name: output
          workspace: output
    - name: clone-dno-config
      runAfter:
        - init-workspace
      taskRef:
        kind: ClusterTask
        name: git-clone
      params:
        - name: url
          value: "https://gitlab.cee.redhat.com/ccit/deployments/dno-config.git"
        - name: revision
          value: main
        - name: sslVerify
          value: 'false'
        - name: subdirectory
          value: "dno-config"
      workspaces:
        - name: output
          workspace: output
    - name: clone-argocd
      runAfter:
        - init-workspace
      taskRef:
        kind: ClusterTask
        name: git-clone
      params:
        - name: url
          value: "https://gitlab.cee.redhat.com/ccit/deployments/argocd.git"
        - name: revision
          value: main
        - name: sslVerify
          value: 'false'
        - name: subdirectory
          value: "argocd"
      workspaces:
        - name: output
          workspace: output
    - name: clone-dns
      runAfter:
        - init-workspace
      taskRef:
        kind: ClusterTask
        name: git-clone
      params:
        - name: url
          value: "https://gitlab.cee.redhat.com/ccit/integration/dns.git"
        - name: revision
          value: main
        - name: sslVerify
          value: 'false'
        - name: subdirectory
          value: "dns"
      workspaces:
        - name: output
          workspace: output
    - name: run-gitlab-monitor
      runAfter:
        - clone-monitor-repo
        - clone-jenkins-csb-controller
        - clone-dno-config
        - clone-argocd
        - clone-dns
      taskRef:
        kind: Task
        name: run-gitlab-monitor
      workspaces:
        - name: output
          workspace: output
    - name: send-notification
      runAfter:
        - run-gitlab-monitor
      taskRef:
        kind: Task
        name: sendmail
      params:
        - name: subject
          value: "GitLab Monitor Report Generated"
        - name: body
          value: |
            GitLab Monitor has successfully generated daily activity report.
            
            Revision: $(params.gitrevision)
            
            Markdown report has been generated and is available in the workspace.
            
            Generated by GitLab Monitor Pipeline
        - name: sender
          value: $(params.sender)
        - name: recipients
          value: $(params.recipients)
  finally:
    - name: clean-pvc
      taskRef:
        kind: Task
        name: clean-pvc
      workspaces:
        - name: clone-directory
          workspace: output 