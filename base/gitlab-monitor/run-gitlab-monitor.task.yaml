apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: run-gitlab-monitor
spec:
  description: >-
    This task runs the Git repository monitor script to analyze local repositories.
    It uses Python 3.11 with only standard library functions - no external dependencies required.

  workspaces:
    - name: output
      description: Working directory where monitor code is located
  steps:
    - name: check-environment
      image: python:3.11
      workingDir: $(workspaces.output.path)
      script: |
        #!/usr/bin/env python3
        import sys
        import subprocess
        
        print("Checking environment and git availability")
        
        # Check Python version
        print(f"Python version: {sys.version}")
        
        # Check git availability
        try:
            result = subprocess.run(["git", "--version"], capture_output=True, text=True, check=True)
            print(f"Git version: {result.stdout.strip()}")
        except subprocess.CalledProcessError:
            print("ERROR: Git is not available")
            sys.exit(1)
        
        print("Environment check completed successfully")
    
    - name: run-monitor
      image: python:3.11
      workingDir: $(workspaces.output.path)
      script: |
        #!/usr/bin/env python3
        import subprocess
        import sys
        
        print("Running Git repository monitor with 24 hours period")
        
        # Run the monitor script
        subprocess.run([
            sys.executable, "monitor/main.py", "--hours", "24"
        ], check=True)
        
        print("Git repository monitor completed successfully") 