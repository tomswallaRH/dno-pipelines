apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: jenkins-csb-migration
spec:
  finally:
    - name: scale-1-source
      params:
        - name: filename
          value: kubeconfig
        - name: project
          value: $(params.project)
        - name: tenant
          value: $(params.instance)
        - name: cluster
          value: $(params.source_cluster)
      retries: 3
      taskRef:
        kind: Task
        name: scale-1
      timeout: 10m0s
      when:
        - input: $(tasks.push-start-instance.status)
          operator: in
          values:
            - Failed
            - None
      workspaces:
        - name: input
          workspace: shared-workspace
    - name: cleanup
      params:
        - name: dest_project
          value: dno--$(params.project)
        - name: filename
          value: kubeconfig
        - name: project
          value: $(params.project)
        - name: tenant
          value: $(params.instance)
        - name: dest_cluster
          value: $(params.dest_cluster)
        - name: source_cluster
          value: $(params.source_cluster)
      taskRef:
        kind: Task
        name: cleanup
      timeout: 5m0s
      workspaces:
        - name: input
          workspace: shared-workspace
    - name: sendmail-success
      params:
        - name: subject
          value: 'Success: Instance migration $(params.instance) $(params.project)'
        - name: body
          value: >-
            Success! All jobs were migrated to $(params.dest_cluster) 

            Canonical URL: https://$(params.project)-$(params.instance).apps.$(params.dest_cluster).prod.psi.redhat.com
            
            Short URL: https://$(params.project)-$(params.instance).dno.corp.redhat.com

            Tenant: $(params.instance)

            Project: dno--$(params.project)

            Source Cluster: $(params.source_cluster)

            Destination Cluster: $(params.dest_cluster)


            $(tasks.run-rsync.results.sync-result)
        - name: sender
          value: $(params.mail_sender)
        - name: recipients
          value: $(params.mail_recipients)
      taskRef:
        kind: Task
        name: sendmail
      timeout: 3m0s
      when:
        - input: $(tasks.run-rsync.status)
          operator: in
          values:
            - Succeeded
        - input: $(tasks.push-start-instance.status)
          operator: in
          values:
            - Succeeded
        - input: $(tasks.post-rsync.status)
          operator: in
          values:
            - Succeeded
    - name: sendmail-error
      params:
        - name: subject
          value: 'Error: Instance migration $(params.instance) $(params.project)'
        - name: body
          value: >-
            Error!

            Instance migration failed! and a fallback was performed.

            The source jenkins was scaled to 1 since there was an error.
            https://$(params.instance)-$(params.project).apps.$(params.source_cluster).prod.psi.redhat.com

            Tenant: $(params.instance)

            Project: $(params.project)

            Source Cluster: $(params.source_cluster)

            Destination Cluster: $(params.dest_cluster)
        - name: sender
          value: $(params.mail_sender)
        - name: recipients
          value: $(params.mail_recipients)
      taskRef:
        kind: Task
        name: sendmail
      timeout: 3m0s
      when:
        - input: $(tasks.push-start-instance.status)
          operator: in
          values:
            - Failed
            - None
  params:
    - description: project for migration
      name: project
      type: string
    - description: jenkins-csb instance (tenant) for migration
      name: instance
      type: string
    - default: dno-pipelines@redhat.com
      description: the email address that will send mail notifications
      name: mail_sender
      type: string
    - default: ifaigenb@redhat.com
      description: the email addresses seperated by space that will get mail notifications
      name: mail_recipients
      type: string
    - default: ocp-c1
      name: source_cluster
      type: string
    - default: dno.ocp-hub
      name: dest_cluster
      type: string
    - default: jenkins
      name: username
      type: string
    - default: controller-clone
      name: controller-clone-path
      type: string
  tasks:
    - name: clone-controller-repo
      params:
        - name: revision
          value: main
        - name: url
          value: >-
            git@gitlab.cee.redhat.com:ccit/deployments/jenkins-csb/controller.git
        - name: refspec
          value: ''
        - name: submodules
          value: 'true'
        - name: depth
          value: '1'
        - name: sslVerify
          value: 'true'
        - name: crtFileName
          value: ca-bundle.crt
        - name: subdirectory
          value: '$(params.controller-clone-path)'
        - name: sparseCheckoutDirectories
          value: ''
        - name: deleteExisting
          value: 'true'
        - name: httpProxy
          value: ''
        - name: httpsProxy
          value: ''
        - name: noProxy
          value: ''
        - name: verbose
          value: 'true'
        - name: gitInitImage
          value: >-
            registry.redhat.io/openshift-pipelines/pipelines-git-init-rhel8@sha256:681dc67d2aa1dbecbf65ecd229c8b181dae533bf14b07543c1aeead36aed2198
        - name: userHome
          value: /home/git
      taskRef:
        kind: ClusterTask
        name: git-clone
      workspaces:
        - name: output
          workspace: shared-workspace
        - name: ssh-directory
          workspace: controller-repo-ssh
      runAfter:
        - run-rsync
    - name: run-rsync
      params:
        - name: filename
          value: kubeconfig
        - name: project
          value: $(params.project)
        - name: dest_project
          value: dno--$(params.project)
        - name: tenant
          value: $(params.instance)
        - name: dest_cluster
          value: $(params.dest_cluster)
        - name: source_cluster
          value: $(params.source_cluster)
        - name: username
          value: $(params.username)
        - name: pvc
          value: $(tasks.gather-info.results.pvc-name)
      runAfter:
        - run-dummy-pod
        - scale-0-all
        - gather-info
        - prepare-resources
      taskRef:
        kind: Task
        name: run-rsync
      timeout: 24h0m0s
      workspaces:
        - name: input
          workspace: shared-workspace
    - name: post-rsync
      params:
        - name: filename
          value: kubeconfig
        - name: project
          value: $(params.project)
        - name: dest_project
          value: dno--$(params.project)
        - name: tenant
          value: $(params.instance)
        - name: dest_cluster
          value: $(params.dest_cluster)
        - name: source_cluster
          value: $(params.source_cluster)
      runAfter:
        - run-rsync
      taskRef:
        kind: Task
        name: post-rsync
      timeout: 10m0s
      workspaces:
        - name: input
          workspace: shared-workspace
#/# Security concern
    - name: push-start-instance
      params:
        - name: BASE_IMAGE
          value: images.paas.redhat.com/it-cloud-ocp-proxy/alpine/git
        - name: GIT_USER_NAME
          value: ccit-test
        - name: GIT_USER_EMAIL
          value: ccit-test@redhat.com
        - name: GIT_SCRIPT
          value: >
            
            FULL_PROJECT_NAME=$(params.project)

            SHORT_TEAM_NAME="${FULL_PROJECT_NAME#"jenkins-csb-"}"

            INSTANCE_VALUES_FILE="tenants/cluster.dno/${SHORT_TEAM_NAME}/$(params.instance)/values.yaml"

            cd $(workspaces.source.path)/$(params.controller-clone-path)
            
            git config --global --add safe.directory $(workspaces.source.path)/$(params.controller-clone-path)

            git checkout -b main

            git pull origin main


            if grep "'suspendInstance: false'" "${INSTANCE_VALUES_FILE}"; then 

              echo "Instance is already running in cluster.dno, consider restarting" && exit 0
            
            else

              echo "Starting instance on dest cluster.dno"

            fi

            sed -i "'s/suspendInstance: true/suspendInstance: false/g'" "${INSTANCE_VALUES_FILE}"

            git add "${INSTANCE_VALUES_FILE}" 

            git commit -am "[pipeline] Starting instance:
            $(params.project)/$(params.instance)" 

            git push origin main
        - name: USER_HOME
          value: /root
        - name: VERBOSE
          value: 'true'
      runAfter:
        - clone-controller-repo
        - post-rsync
      taskRef:
        kind: Task
        name: git-cli
      workspaces:
        - name: source
          workspace: shared-workspace
        - name: ssh-directory
          workspace: controller-repo-ssh
#/# Security concern
    - name: prepare-resources
      params:
        - name: filename
          value: kubeconfig
        - name: project
          value: $(params.project)
        - name: tenant
          value: $(params.instance)
        - name: dest_cluster
          value: $(params.dest_cluster)
        - name: username
          value: $(params.username)
        - name: source_cluster
          value: $(params.source_cluster)
      runAfter:
        - source-kubeconfig
      taskRef:
        kind: Task
        name: prepare-resources
      timeout: 3m0s
      workspaces:
        - name: input
          workspace: shared-workspace
    - name: scale-0-all
      params:
        - name: filename
          value: kubeconfig
        - name: project
          value: $(params.project)
        - name: tenant
          value: $(params.instance)
        - name: dest_cluster
          value: $(params.dest_cluster)
        - name: source_cluster
          value: $(params.source_cluster)
      runAfter:
        - source-kubeconfig
        - dest-kubeconfig
      taskRef:
        kind: Task
        name: scale-0
      timeout: 3m0s
      workspaces:
        - name: input
          workspace: shared-workspace
    - name: run-dummy-pod
      params:
        - name: filename
          value: kubeconfig
        - name: project
          value: dno--$(params.project)
        - name: tenant
          value: $(params.instance)
        - name: dest_cluster
          value: $(params.dest_cluster)
      runAfter:
        - dest-kubeconfig
      taskRef:
        kind: Task
        name: run-dummy-pod
      timeout: 5m0s
      workspaces:
        - name: input
          workspace: shared-workspace
        - name: output
          workspace: shared-workspace
    - name: gather-info
      params:
        - name: filename
          value: kubeconfig
        - name: project
          value: $(params.project)
        - name: tenant
          value: $(params.instance)
        - name: dest_cluster
          value: $(params.dest_cluster)
        - name: username
          value: $(params.username)
        - name: source_cluster
          value: $(params.source_cluster)
      runAfter:
        - source-kubeconfig
      taskRef:
        kind: Task
        name: gather-info
      timeout: 3m0s
      workspaces:
        - name: input
          workspace: shared-workspace
    - name: source-kubeconfig
      params:
        - name: cluster
          value: $(params.source_cluster)
        - name: url
          value: 'https://api.$(params.source_cluster).prod.psi.redhat.com:6443'
        - name: username
          value: $(params.username)
        - name: insecure
          value: 'false'
        - name: namespace
          value: $(params.project)
        - name: filename
          value: kubeconfig
      taskRef:
        kind: Task
        name: create-kubeconfig
      timeout: 3m0s
      workspaces:
        - name: output
          workspace: shared-workspace
    - name: dest-kubeconfig
      params:
        - name: cluster
          value: $(params.dest_cluster)
        - name: url
          value: 'https://api.$(params.dest_cluster).prod.psi.redhat.com:6443'
        - name: username
          value: $(params.username)
        - name: insecure
          value: 'false'
        - name: namespace
          value: dno--$(params.project)
        - name: filename
          value: kubeconfig
      taskRef:
        kind: Task
        name: create-kubeconfig
      timeout: 3m0s
      workspaces:
        - name: output
          workspace: shared-workspace
  workspaces:
    - name: shared-workspace
    - name: controller-repo-ssh
