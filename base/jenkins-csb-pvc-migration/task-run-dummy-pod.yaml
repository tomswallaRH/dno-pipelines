apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: run-dummy-pod
spec:
  params:
  - description: kubeconfig file name
    name: filename
    type: string
  - description: project name
    name: project
    type: string
  - description: tenant name
    name: tenant
    type: string
  - description: name of the cluster
    name: dest_cluster
    type: string
  steps:
  - image: quay.io/openshift/origin-cli:4.20
    name: modify-template
    resources: {}
    script: |
      #!/usr/bin/env bash
      set -euo pipefail
      trap 's=$?; echo >&2 "$0: Error on line "$LINENO": $BASH_COMMAND"; exit $s' ERR
      sed 's/replaceme/$(inputs.params.tenant)/g' /var/dummy-template/template > "$(workspaces.output.path)"/modified_template.yaml
      echo "template modified"
    volumeMounts:
    - mountPath: /var/dummy-template
      name: dummy-template
  - image: quay.io/openshift/origin-cli:4.20
    name: scale-up-dummy
    resources: {}
    script: |
      #!/usr/bin/env bash
      set -euo pipefail
      trap 's=$?; echo >&2 "$0: Error on line "$LINENO": $BASH_COMMAND"; exit $s' ERR
      export KUBECONFIG="$(workspaces.input.path)/$(inputs.params.dest_cluster)/$(inputs.params.filename)"
      oc delete pod "$(inputs.params.tenant)"-rsync-reciever -n "$(inputs.params.project)" --ignore-not-found=true
      echo "Starting dummy pod"
      oc create -f "$(workspaces.output.path)"/modified_template.yaml -n "$(inputs.params.project)"
      while [[ $(oc get pods "$(inputs.params.tenant)"-rsync-reciever -n "$(inputs.params.project)" -o 'jsonpath={..status.conditions[?(@.type=="Ready")].status}') != "True" ]]; do echo "waiting for pod to be ready" && sleep 1; done

      echo "Pod is ready"
    volumeMounts:
    - mountPath: /var/dummy-template
      name: dummy-template
  volumes:
  - configMap:
      name: dummy-pod
    name: dummy-template
  workspaces:
  - name: input
    readOnly: true
  - name: output
