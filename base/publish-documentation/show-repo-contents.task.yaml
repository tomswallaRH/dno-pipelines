apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: show-repo-contents
spec:
  description: Show the cloned repository contents
  workspaces:
    - name: source
  steps:
    - name: list-files
      image: registry.redhat.io/ubi8/ubi-minimal
      script: |
        #!/usr/bin/env bash
        
        echo "Repository Contents:"
        echo "======================"
        
        cd $(workspaces.source.path)
        ls -la
        
        echo ""
        echo "Done"
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532 