# Konflux Component CR — apply in cluster or register via UI; paths are relative to repo root.
#
# spec.containerImage — push destination (no tag in CR). Konflux tags per build; PaC `output-image`
# must use this repository + a tag (e.g. :{{revision}} on main, :on-pr-{{revision}} for PRs).
apiVersion: appstudio.redhat.com/v1alpha1
kind: Component
metadata:
  name: coffee-break
  namespace: sfathii-tenant
spec:
  application: coffee
  componentName: coffee-break
  containerImage: quay.io/redhat-user-workloads/sfathii-tenant/coffee/coffee-break
  source:
    git:
      url: https://github.com/tomswallaRH/dno-automation-services.git
      revision: main
      context: applications/coffee/components/coffee-break
      dockerfileUrl: Containerfile
