# Konflux integration test: run the **coffee-break** image from the ApplicationSnapshot and assert logs.
# Konflux supplies SNAPSHOT JSON (components[].name / .containerImage). This pipeline selects the
# component named `coffee-break` — same name as metadata in applications/coffee/components/coffee-break/component.yaml.
#
# Register: Application → Integration tests → IntegrationTestScenario with pathInRepo =
#   applications/coffee/integration/verify-hello.yaml
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: coffee-break-verify-hello-world
  labels:
    appstudio.openshift.io/application: coffee
    appstudio.openshift.io/component: coffee-break
spec:
  description: >-
    Runs the coffee-break component image from the snapshot and checks stdout for "Hello World".
  params:
    - name: SNAPSHOT
      description: >-
        Snapshot JSON from Konflux. Must include a component with name "coffee-break" and
        containerImage set to the image built for that snapshot (same registry path as spec.containerImage in component.yaml).
      type: string
      default: '{"components":[{"name":"coffee-break","containerImage":"quay.io/redhat-user-workloads/sfathii-tenant/coffee/coffee-break:latest"}]}'
  tasks:
    - name: run-image-and-verify-logs
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
      taskSpec:
        description: kubectl run → logs → grep Hello World → TEST_OUTPUT
        params:
          - name: SNAPSHOT
            type: string
        results:
          - name: TEST_OUTPUT
            type: string
            description: Standard Konflux integration test result JSON
        steps:
          - name: verify
            image: docker.io/alpine/k8s:1.31.13
            env:
              - name: SNAPSHOT
                value: $(params.SNAPSHOT)
            script: |
              #!/bin/sh
              set -eu
              NS="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
              IMAGE="$(echo "${SNAPSHOT}" | jq -r '.components[] | select(.name=="coffee-break") | .containerImage' | head -n1)"
              if [ -z "${IMAGE}" ] || [ "${IMAGE}" = "null" ]; then
                echo "ERROR: no containerImage for component coffee-break in SNAPSHOT"
                exit 1
              fi
              echo "Using image: ${IMAGE}"
              POD="coffee-brk-verify-${RANDOM}"
              kubectl run "${POD}" --image="${IMAGE}" --restart=Never -n "${NS}" \
                --requests=cpu=100m,memory=128Mi
              kubectl wait "pod/${POD}" -n "${NS}" \
                --for=jsonpath='{.status.phase}'=Succeeded --timeout=120s
              echo "=== container logs ==="
              LOGS="$(kubectl logs "pod/${POD}" -n "${NS}")"
              echo "${LOGS}"
              kubectl delete pod "${POD}" -n "${NS}" --wait=false >/dev/null 2>&1 || true
              TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              if echo "${LOGS}" | grep -Fq "Hello World"; then
                echo -n "{\"result\":\"SUCCESS\",\"timestamp\":\"${TS}\",\"failures\":0,\"successes\":1,\"warnings\":0}" \
                  | tee "$(results.TEST_OUTPUT.path)"
                exit 0
              fi
              echo -n "{\"result\":\"FAILURE\",\"timestamp\":\"${TS}\",\"note\":\"Expected Hello World in logs\",\"failures\":1,\"successes\":0,\"warnings\":0}" \
                | tee "$(results.TEST_OUTPUT.path)"
              exit 1
