# Integration test: run coffee-break image, wait for Ready, HTTP GET / → body contains "OK".
# Register: Application → Integration tests → pathInRepo = applications/coffee/integration/verify-hello.yaml
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: coffee-break-verify-hello-world
  labels:
    appstudio.openshift.io/application: coffee
    appstudio.openshift.io/component: coffee-break
spec:
  description: >-
    Deploy coffee-break from SNAPSHOT, wait for pod Ready, curl :8080/, assert response contains OK.
  params:
    - name: SNAPSHOT
      description: >-
        Snapshot JSON. Must include component name "coffee-break" and containerImage for that build.
      type: string
      default: '{"components":[{"name":"coffee-break","containerImage":"quay.io/redhat-user-workloads/sfathii-tenant/coffee/coffee-break:latest"}]}'
  tasks:
    - name: deploy-and-http-check
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
      taskSpec:
        description: kubectl run app → Ready → wget GET / → grep OK → TEST_OUTPUT
        params:
          - name: SNAPSHOT
            type: string
        results:
          - name: TEST_OUTPUT
            type: string
            description: Konflux integration test result JSON
        steps:
          - name: verify
            image: docker.io/alpine/k8s:1.31.13
            env:
              - name: SNAPSHOT
                value: $(params.SNAPSHOT)
            script: |
              #!/bin/sh
              set -eu
              NS="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
              IMAGE="$(echo "${SNAPSHOT}" | jq -r '.components[] | select(.name=="coffee-break") | .containerImage' | head -n1)"
              if [ -z "${IMAGE}" ] || [ "${IMAGE}" = "null" ]; then
                echo "ERROR: no containerImage for component coffee-break in SNAPSHOT"
                exit 1
              fi
              echo "Using image: ${IMAGE}"
              APP_POD="coffee-brk-app-${RANDOM}"
              kubectl run "${APP_POD}" --image="${IMAGE}" --restart=Never -n "${NS}" \
                --port=8080 \
                --requests=cpu=100m,memory=128Mi
              kubectl wait "pod/${APP_POD}" -n "${NS}" --for=condition=Ready --timeout=120s
              POD_IP="$(kubectl get "pod/${APP_POD}" -n "${NS}" -o jsonpath='{.status.podIP}')"
              echo "Pod IP: ${POD_IP}"
              CURL_POD="coffee-brk-curl-${RANDOM}"
              kubectl run "${CURL_POD}" --image=docker.io/library/busybox:1.36 --restart=Never -n "${NS}" -- \
                wget -qO- "http://${POD_IP}:8080/"
              kubectl wait "pod/${CURL_POD}" -n "${NS}" \
                --for=jsonpath='{.status.phase}'=Succeeded --timeout=60s
              echo "=== wget (HTTP body) logs ==="
              BODY="$(kubectl logs "pod/${CURL_POD}" -n "${NS}")"
              echo "${BODY}"
              kubectl delete pod "${CURL_POD}" -n "${NS}" --wait=false >/dev/null 2>&1 || true
              kubectl delete pod "${APP_POD}" -n "${NS}" --wait=false >/dev/null 2>&1 || true
              TS="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              if echo "${BODY}" | grep -Fq "OK"; then
                echo -n "{\"result\":\"SUCCESS\",\"timestamp\":\"${TS}\",\"failures\":0,\"successes\":1,\"warnings\":0}" \
                  | tee "$(results.TEST_OUTPUT.path)"
                exit 0
              fi
              echo -n "{\"result\":\"FAILURE\",\"timestamp\":\"${TS}\",\"note\":\"Expected OK in HTTP response\",\"failures\":1,\"successes\":0,\"warnings\":0}" \
                | tee "$(results.TEST_OUTPUT.path)"
              exit 1
