# Tekton Pipeline — Application `coffee` / Component `coffee-break`
#
# Source of truth for *what* gets built:
#   - Git: params `git-url` + `revision` (Konflux PaC sets these from the webhook via {{source_url}}, {{revision}}).
#   - Context on disk after clone: $(workspaces.shared-data.path)/source/<context-subdir>
#   - Containerfile: <context-subdir>/$(params.containerfile) — default `Containerfile` under
#     applications/coffee/components/coffee-break/
#
# Konflux CI default: `.tekton/coffee-break-on-*.yaml` runs the **catalog** bundle `docker-build-oci-ta`
# with the same path + dockerfile as the defaults here (`path-context` / `dockerfile` ↔ `context-subdir` /
# `containerfile`). If you change defaults, update PaC params and `component.yaml` accordingly.
#
# This file can also be referenced directly (e.g. git `pipelineRef` resolver) for manual PipelineRuns.
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: coffee-break-pipeline
  labels:
    appstudio.openshift.io/application: coffee
    appstudio.openshift.io/component: coffee-break
spec:
  description: >-
    Clone → quick source test (py_compile) → build/push coffee-break. After the image is in the
    registry, Konflux runs integration tests (e.g. applications/coffee/integration/verify-hello.yaml)
    from an ApplicationSnapshot — that is the HTTP “OK” check in-cluster.
  params:
    - name: git-url
      type: string
      description: Git repository URL (HTTPS).
    - name: revision
      type: string
      description: Git revision (branch, tag, or SHA).
    - name: image
      type: string
      description: Fully qualified image reference to push (including tag).
    - name: context-subdir
      type: string
      default: applications/coffee/components/coffee-break
      description: Path from repo root to the container build context.
    - name: containerfile
      type: string
      default: Containerfile
      description: Dockerfile/Containerfile name relative to context.
  workspaces:
    - name: shared-data
      description: Clone output and OCI build working directory.
    - name: dockerconfig
      description: Optional registry credentials (.dockerconfigjson).
      optional: true
  tasks:
    # fetch-source — shallow clone of $(params.git-url) at $(params.revision) into workspace `shared-data/source/`.
    - name: fetch-source
      workspaces:
        - name: output
          workspace: shared-data
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.revision)
      taskSpec:
        workspaces:
          - name: output
        params:
          - name: url
            type: string
          - name: revision
            type: string
        steps:
          - name: clone
            image: registry.access.redhat.com/ubi9/git:latest
            script: |
              #!/bin/bash
              set -euo pipefail
              rm -rf "$(workspaces.output.path)/source"/*
              git clone --no-checkout "$(params.url)" "$(workspaces.output.path)/source"
              cd "$(workspaces.output.path)/source"
              git fetch --depth 1 origin "$(params.revision)" || git fetch origin "$(params.revision)"
              git checkout FETCH_HEAD || git checkout "$(params.revision)"

    # Minimal test before image build (same Python as Containerfile).
    - name: test-source
      runAfter: [fetch-source]
      workspaces:
        - name: w
          workspace: shared-data
      params:
        - name: context-subdir
          value: $(params.context-subdir)
      taskSpec:
        workspaces:
          - name: w
        params:
          - name: context-subdir
            type: string
        steps:
          - name: py-compile
            image: registry.access.redhat.com/ubi9/python-312:latest
            script: |
              #!/bin/bash
              set -euo pipefail
              SRC="$(workspaces.w.path)/source/$(params.context-subdir)/src/app.py"
              python3 -m py_compile "${SRC}"
              echo "py_compile OK: ${SRC}"

    # build-and-push — buildah in `context-subdir` using that dir's Containerfile; tags and pushes $(params.image).
    # Registry credentials: optional workspace `dockerconfig` (.dockerconfigjson) when bound.
    - name: build-and-push
      runAfter: [test-source]
      workspaces:
        - name: w
          workspace: shared-data
        - name: dockerconfig
          workspace: dockerconfig
      params:
        - name: image
          value: $(params.image)
        - name: context-subdir
          value: $(params.context-subdir)
        - name: containerfile
          value: $(params.containerfile)
      taskSpec:
        workspaces:
          - name: w
          - name: dockerconfig
            optional: true
        params:
          - name: image
            type: string
          - name: context-subdir
            type: string
          - name: containerfile
            type: string
        steps:
          - name: build-and-push
            image: quay.io/buildah/stable:latest
            securityContext:
              capabilities:
                add: ["SETFCAP"]
            script: |
              #!/bin/sh
              set -eu
              export STORAGE_DRIVER=vfs
              DOCKERCFG="$(workspaces.dockerconfig.path)"
              if [ -n "${DOCKERCFG}" ] && [ -f "${DOCKERCFG}/config.json" ]; then
                mkdir -p /root/.docker
                cp "${DOCKERCFG}/config.json" /root/.docker/config.json
              fi
              CTX="$(workspaces.w.path)/source/$(params.context-subdir)"
              buildah bud --layers --format docker \
                -f "${CTX}/$(params.containerfile)" \
                -t "$(params.image)" \
                "${CTX}"
              buildah push "$(params.image)"
